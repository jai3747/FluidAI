name: Build → Push → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fluidai-demo

jobs:
  # ── Job 1: Build & push Docker image ───────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          # Use short SHA as tag for traceability
          TAG="${GITHUB_SHA::8}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: ${{ github.ref == 'refs/heads/main' }}   # only push on main
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to Kubernetes ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'   # only deploy from main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        # KUBECONFIG_B64 = base64-encoded kubeconfig stored in GitHub Secrets
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Substitute image tag in deployment manifest
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|IMAGE_TAG|${TAG}|g" k8s/03-app.yaml
          sed -i "s|YOUR_DOCKERHUB_USERNAME|${{ secrets.DOCKERHUB_USERNAME }}|g" k8s/03-app.yaml
          echo "Deploying image tag: ${TAG}"
          grep "image:" k8s/03-app.yaml   # confirm substitution

      - name: Apply all Kubernetes manifests
        run: |
          kubectl apply -f k8s/00-namespace-configmap.yaml
          kubectl apply -f k8s/01-secret.yaml
          kubectl apply -f k8s/02-redis.yaml
          kubectl apply -f k8s/03-app.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fastapi-app \
            -n fluidai \
            --timeout=120s

      - name: Verify pods are running
        run: |
          kubectl get pods -n fluidai
          kubectl get services -n fluidai
