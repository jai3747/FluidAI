# Secret for Redis password.
# In a real environment this would come from Vault / External Secrets Operator.
# For demo: base64("devpassword123") = ZGV2cGFzc3dvcmQxMjM=
#
# To regenerate:  echo -n "devpassword123" | base64
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: fluidai
type: Opaque
data:
  redis-password: ZGV2cGFzc3dvcmQxMjM=   # devpassword123
