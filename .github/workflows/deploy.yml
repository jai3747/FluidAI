name: Build → Push → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fluidai-demo

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push Docker image
        run: |
          TAG="${GITHUB_SHA::8}"
          IMAGE="mjai3747/fluidai-demo"
          
          echo "Building image $IMAGE:$TAG..."
          docker build -t $IMAGE:$TAG -t $IMAGE:latest ./app
          
          echo "Pushing image to Docker Hub..."
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest
          
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying image tag: ${IMAGE_TAG}"
          
          # Substitute tag in manifest (using Mac-specific sed)
          sed -i '' "s|IMAGE_TAG|${IMAGE_TAG}|g" k8s/03-app.yaml
          sed -i '' "s|YOUR_DOCKERHUB_USERNAME|mjai3747|g" k8s/03-app.yaml
          
          # Apply to local Minikube cluster
          kubectl apply -f k8s/00-namespace-configmap.yaml
          kubectl apply -f k8s/01-secret.yaml
          kubectl apply -f k8s/02-redis.yaml
          kubectl apply -f k8s/03-app.yaml
          
          # Wait for successful rollout
          kubectl rollout status deployment/fastapi-app -n fluidai --timeout=120s
