apiVersion: v1
kind: Namespace
metadata:
  name: fluidai
  labels:
    app.kubernetes.io/managed-by: kubectl

---
# ConfigMap holds non-sensitive config.
# Sensitive values (passwords) go in the Secret below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: fluidai
data:
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
